<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman - Phaser 3</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #f6f0d5 0%, #f4a261 40%, #264653 100%);
      }

      #game-container {
        width: min(100vw, 960px);
        height: min(100vh, 640px);
        border: 3px solid rgba(255, 255, 255, 0.55);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        border-radius: 14px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="./utils/words.js"></script>
    <script src="./scenes/TitleScene.js"></script>
    <script src="./scenes/GameScene.js"></script>
    <script src="./scenes/GameOverScene.js"></script>
    <script src="./config.js"></script>
  </body>
</html>
